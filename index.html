<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>FirstLine Health - Patient Registration</title>

<link rel="stylesheet" href="style.css">

<script src="script.js" defer></script>

</head>

<body>

<div id="header">

<div class="header-left">

<img src="./logo.png"
alt="FLH Logo"
class="logo">

</div>

<div class="header-center">

<h1>FirstLine Health</h1>

<div id="currentDate"></div>

</div>

</div>

<div id="main">

<h2>Patient Registration Form</h2>

<form action="thankyou.html" id="patientForm">

<table>

<tr>

<td>First Name:</td>

<td>

<input type="text"
id="firstName"
oninput="validateFirstName()"
required>

<span class="error"
id="firstNameError"></span>

</td>

<td>Last Name:</td>

<td>

<input type="text"
id="lastName"
oninput="validateLastName()"
required>

<span class="error"
id="lastNameError"></span>

</td>

</tr>

<tr>

<td>Date of Birth:</td>

<td>

<input type="date"
id="dob"
onblur="validateDOB()">

<span class="error"
id="dobError"></span>

</td>

<td>SSN:</td>

<td>

<input type="password"
id="ssn"
maxlength="11"
oninput="validateSSN()">

<label>

<input type="checkbox"
onclick="toggleSSN()">

Show SSN

</label>

<span class="error"
id="ssnError"></span>

</td>

</tr>

<tr>

<td>Address:</td>

<td>

<input type="text"
id="address1"
oninput="validateAddress()">

<span class="error"
id="addressError"></span>

</td>

<td>City:</td>

<td>

<input type="text"
id="city"
oninput="validateCity()">

<span class="error"
id="cityError"></span>

</td>

</tr>

<tr>

<td>State:</td>

<td>

<select id="state">

<option value="">Select</option>
<option>TX</option>
<option>CA</option>
<option>NY</option>
<option>FL</option>
<option>WA</option>

</select>

</td>

<td>ZIP:</td>

<td>

<input type="text"
id="zip"
maxlength="5"
oninput="validateZip()">

<span class="error"
id="zipError"></span>

</td>

</tr>

<tr>

<td>Email:</td>

<td>

<input type="text"
id="email"
oninput="validateEmail()">

<span class="error"
id="emailError"></span>

</td>

<td>User ID:</td>

<td>

<input type="text"
id="userId"
oninput="validateUserID()">

<span class="error"
id="userIdError"></span>

</td>

</tr>

<tr>

<td>Password:</td>

<td>

<input type="password"
id="password"
oninput="validatePasswordStrength()">

<span class="error"
id="passwordError"></span>

</td>

<td>Confirm Password:</td>

<td>

<input type="password"
id="confirmPassword"
oninput="validatePasswordMatch()">

<span class="error"
id="confirmPasswordError"></span>

</td>

</tr>

<tr>

<td>Symptoms:</td>

<td colspan="3">

<textarea id="symptoms"></textarea>

</td>

</tr>

<tr>

<td>Health Scale:</td>

<td colspan="3">

<input type="range"
id="salary"
min="1"
max="10"
value="5"
oninput="updateSlider()">

<span id="salaryValue">5</span>

</td>

</tr>

<tr>

<td colspan="4" align="center">

<button type="button"
onclick="reviewForm()">

Review

</button>

<button type="button"
onclick="validateForm()">

Validate

</button>

<input type="submit"
id="submitBtn"
value="Submit"
style="display:none;">

<input type="reset"
value="Reset">

</td>

</tr>

</table>

</form>

<div id="reviewSection">

<h2>PLEASE REVIEW THIS INFORMATION</h2>

<div id="reviewOutput"></div>

</div>

</div>

<div id="footer">

FirstLine Health | Houston, TX

</div>

</body>
</html>
